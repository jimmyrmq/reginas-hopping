<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resgina Shop</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <div class="header-top">

            <div class="header-center">
                <h1>Regina Shop</h1>
                <p>Zapatillas & Indumentaria</p>
            </div>

            <div class="header-right">

                <div class="cart-icon" onclick="scrollToCart()">
                    🛒
                    <span id="cartCount">0</span>
                </div>

                <div class="cart-total-header">
                    <span id="headerTotal">$0</span>
                </div>

            </div>

        </div>

        <!-- 🔎 MANTENEMOS LA BÚSQUEDA 
        <input type="text" id="search" placeholder="Buscar productos...">-->

    </header>

<nav class="filters">

    <div class="filter-buttons">
        <button id="btn-todos" onclick="filtrar('todos', this)">Todos</button>
        <button onclick="filtrar('zapatillas', this)">Zapatillas</button>
        <button onclick="filtrar('ropa', this)">Indumentaria</button>
    </div>

    <div class="search-box">
        <input type="text" id="search" placeholder="Buscar productos...">
    </div>

</nav>

    <section id="productos" class="grid"></section>

    <section class="cart">
        <h2>Carrito</h2>

        <div id="cartItems"></div>

        <h3>Total: <span id="total">$0</span></h3>

        <button class="whatsapp" onclick="enviarWhatsApp()">
            Enviar pedido por WhatsApp            
        </button>

    </section>

    <!-- MODAL PARA DATOS DE ENVÍO -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeOrderModal()">&times;</span>
            <h2>Datos de Envío</h2>
            <form id="orderForm">
                <div class="form-group">
                    <label for="customerName">Nombre:</label>
                    <input type="text" id="customerName" placeholder="Tu nombre completo" required>
                </div>
                <div class="form-group">
                    <label for="customerAddress">Dirección de Envío:</label>
                    <input type="text" id="customerAddress" placeholder="Calle, número, piso/depto" required>
                </div>
                <div class="form-group">
                    <label for="customerPhone">Teléfono:</label>
                    <input type="tel" id="customerPhone" placeholder="Tu teléfono" required>
                </div>
                <div class="form-group">
                    <label for="customerDetails">Detalles/Observaciones:</label>
                    <textarea id="customerDetails" placeholder="Algún detalle importante..." rows="4"></textarea>
                </div>
                <div class="form-buttons">
                    <button type="button" class="btn-cancel" onclick="closeOrderModal()">Cancelar</button>
                    <button type="submit" class="btn-send">Enviar Pedido</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
